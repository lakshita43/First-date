<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Tiny Question 💌</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="card">
    <h2>Hey, you... 💗</h2>
    <p>I have a tiny question...</p>

    <button id="open">
        Open 💌
    </button>
</div>

<div id="question" class="hidden">

    <h1>Would you like to go on a date with me? 🌸</h1>

    <div class="buttons">
        <button id="yes">YES! 💖</button>
        <button id="no">No 🙈</button>
    </div>

    <div id="yay" class="hidden">
        <h1>🎉 YAYYYY!! 🥹❤️</h1>
        <p>It's a date then! 🌷</p>
        <p>✨ I can't wait!</p>
    </div>

</div>

<canvas id="fx"></canvas>

<script src="script.js"></script>

</body>
</html>
