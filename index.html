<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>A Little Surprise 💌</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Floating Hearts -->
    <div class="hearts"></div>

    <!-- Sparkles -->
    <div class="sparkles"></div>

    <!-- Landing Page -->
    <section id="landing">

        <div class="glass">

            <div class="envelope">
                💌
            </div>

            <h1>A little surprise for <span>Teena</span> 💗</h1>

            <p>Someone has something special to ask you...</p>

            <button id="openBtn">
                Open ✨
            </button>

        </div>

    </section>

    <!-- Question Section -->

    <section id="questionPage" class="hidden">

        <div class="glass questionBox">

            <h3 id="typing"></h3>

            <h1 class="question">

                Would you like to go on a date with me? 🌸

            </h1>

            <div class="buttons">

                <button id="yesBtn">
                    💖 YES!
                </button>

                <button id="noBtn">
                    🙈 No
                </button>

            </div>

        </div>

    </section>

    <!-- Success Page -->

    <section id="success" class="hidden">

        <div class="glass successBox">

            <h1>🥹💖</h1>

            <h2>YAYYYYY!!</h2>

            <p>

                It's a date, <b>Teena!</b> 🌸

            </p>

            <p>

                I seriously can't wait! ❤️

            </p>

            <button id="music">

                🎵 Play Our Song

            </button>

        </div>

    </section>

    <!-- Canvas for Fireworks -->

    <canvas id="canvas"></canvas>

    <script src="script.js"></script>

</body>

</html>
